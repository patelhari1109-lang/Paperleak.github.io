<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Console — Learn &amp; Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070B1A; --cyan:#22D3EE; --violet:#8B5CF6; --pink:#F472B6;
  --lime:#4ADE80; --red:#FB7185; --gold:#FBBF24;
  --ink:#E7ECF8; --dim:#8b93ad;
  --grad:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink));
  --spring:cubic-bezier(.22,1.4,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh; overflow-x:hidden;
}
.mono{font-family:'JetBrains Mono',monospace}

/* ---------- ambient background ---------- */
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.35;pointer-events:none;z-index:0}
.o1{width:520px;height:520px;background:#1d4ed8;top:-160px;left:-140px;animation:drift1 26s ease-in-out infinite alternate}
.o2{width:460px;height:460px;background:#7c3aed;bottom:-180px;right:-120px;animation:drift2 31s ease-in-out infinite alternate}
.o3{width:340px;height:340px;background:#0e7490;top:40%;left:55%;animation:drift3 24s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(120px,90px) scale(1.15)}}
@keyframes drift2{to{transform:translate(-100px,-80px) scale(1.1)}}
@keyframes drift3{to{transform:translate(-140px,60px) scale(.9)}}
.gridlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(139,92,246,.12) 1px,transparent 1px),
    linear-gradient(90deg,rgba(139,92,246,.12) 1px,transparent 1px);
  background-size:44px 44px;
  -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,.8),transparent 55%);
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.8),transparent 55%);
}

/* ---------- glass + gradient border ---------- */
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.09);border-radius:20px}
.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:26px 20px 80px}

header.hdr{position:relative;padding:30px 32px;text-align:center;overflow:hidden;
  animation:popIn .7s var(--spring) both}
header.hdr::before{content:'';position:absolute;inset:0;border-radius:20px;padding:1.6px;
  background:linear-gradient(120deg,var(--cyan),var(--violet),var(--pink),var(--cyan));
  background-size:300% 300%;animation:flowB 6s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
@keyframes flowB{to{background-position:300% 0}}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;
  color:var(--cyan);text-transform:uppercase;margin-bottom:10px}
h1.title{font-size:clamp(28px,4.5vw,44px);font-weight:700;letter-spacing:-.5px;
  background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink),var(--cyan));
  background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shine 5s linear infinite}
@keyframes shine{to{background-position:220% center}}
.subtitle{color:var(--dim);margin-top:8px;font-size:15px}

.stats{display:flex;justify-content:center;gap:14px;margin-top:24px;flex-wrap:wrap}
.stat{min-width:118px;padding:14px 18px;border-radius:16px;background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);animation:popIn .6s var(--spring) both}
.stat:nth-child(2){animation-delay:.08s}.stat:nth-child(3){animation-delay:.16s}.stat:nth-child(4){animation-delay:.24s}
.stat .num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700}
.stat .lbl{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);margin-top:3px}
.stat.c-cyan .num{color:var(--cyan)}.stat.c-violet .num{color:var(--violet)}
.stat.c-pink .num{color:var(--pink)}.stat.c-lime .num{color:var(--lime)}
.stat .num.tick{animation:numPop .4s var(--spring)}
@keyframes numPop{40%{transform:scale(1.35)}}

/* ---------- layout ---------- */
.layout{display:grid;grid-template-columns:280px 1fr;gap:22px;margin-top:22px;align-items:start}
aside.side{position:sticky;top:16px;padding:20px;animation:popIn .7s var(--spring) .15s both}
.side h3{font-size:12px;letter-spacing:2.4px;text-transform:uppercase;color:var(--dim);margin-bottom:14px;font-family:'JetBrains Mono',monospace}
.tlist{display:flex;flex-direction:column;gap:8px}
.titem{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:13px;cursor:pointer;
  border:1px solid transparent;transition:all .25s var(--spring);background:rgba(255,255,255,.02)}
.titem:hover{background:rgba(255,255,255,.07);transform:translateX(4px)}
.titem.active{background:rgba(139,92,246,.16);border-color:rgba(139,92,246,.45);
  box-shadow:0 0 18px rgba(139,92,246,.25)}
.titem .ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;flex-shrink:0;
  background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25)}
.titem .tn{font-size:13.5px;font-weight:600;line-height:1.25}
.titem .tp{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--dim);margin-top:2px}
.titem.done .tp{color:var(--lime)}
.pbarw{margin-top:18px}
.pbarl{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--dim);margin-bottom:7px}
.pbar{height:9px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;position:relative}
.pfill{height:100%;width:0%;border-radius:99px;background:var(--grad);position:relative;transition:width .7s var(--spring)}
.pfill::after{content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);
  background-size:200% 100%;animation:shimmer 2.2s linear infinite}
@keyframes shimmer{to{background-position:-200% 0}}
.resbtn{margin-top:18px;width:100%;padding:13px;border:none;border-radius:14px;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#0b1024;
  background:var(--grad);background-size:200% auto;transition:all .3s var(--spring)}
.resbtn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 26px rgba(139,92,246,.45);background-position:100% 0}

/* ---------- main panel ---------- */
main.panel{min-width:0}
.tophead{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;
  animation:popIn .55s var(--spring) both}
.tophead h2{font-size:22px;font-weight:700}
.tophead .tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);
  border:1px solid rgba(34,211,238,.35);background:rgba(34,211,238,.08);
  padding:5px 12px;border-radius:99px;white-space:nowrap}
.learn{margin-top:16px;padding:20px 22px;border-left:3px solid var(--cyan);animation:popIn .55s var(--spring) .06s both}
.learn h4{font-size:12px;letter-spacing:2.2px;text-transform:uppercase;color:var(--cyan);
  font-family:'JetBrains Mono',monospace;margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:8px 13px;border-radius:99px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);color:#cdd6ee;line-height:1.4}
.chip b{color:var(--gold);font-weight:600}

.qcard{margin-top:16px;padding:22px 24px;animation:popIn .55s var(--spring) both}
.qtop{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.qnum{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim)}
.qtag{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:4px 11px;border-radius:99px;letter-spacing:.5px}
.qtag.concept{color:var(--violet);border:1px solid rgba(139,92,246,.4);background:rgba(139,92,246,.1)}
.qtag.calc{color:var(--pink);border:1px solid rgba(244,114,182,.4);background:rgba(244,114,182,.1)}
.qtext{font-size:16.5px;font-weight:600;line-height:1.5;margin-bottom:16px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{position:relative;text-align:left;padding:13px 15px;border-radius:13px;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:14.5px;color:var(--ink);line-height:1.4;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.11);
  transition:all .25s var(--spring)}
.opt .key{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);margin-right:9px}
.opt:hover:not(:disabled){background:rgba(34,211,238,.09);border-color:rgba(34,211,238,.4);
  transform:translateY(-2px) scale(1.015);box-shadow:0 6px 18px rgba(34,211,238,.14)}
.opt:disabled{cursor:default}
.opt.correct{background:rgba(74,222,128,.13);border-color:var(--lime);color:#d9ffe6;
  box-shadow:0 0 22px rgba(74,222,128,.4);animation:goodPop .55s var(--spring)}
.opt.correct .key{color:var(--lime)}
@keyframes goodPop{35%{transform:scale(1.06)}65%{transform:scale(.98)}}
.opt.wrong{background:rgba(251,113,133,.13);border-color:var(--red);color:#ffdfe4;
  box-shadow:0 0 20px rgba(251,113,133,.4);animation:shake .45s ease}
.opt.wrong .key{color:var(--red)}
@keyframes shake{20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
.opt.dimmed{opacity:.32}
.why{margin-top:14px;padding:14px 16px;border-radius:13px;display:none;
  background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.35);line-height:1.55;font-size:14px}
.why.show{display:block;animation:whyIn .5s var(--spring) both}
@keyframes whyIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.why b{color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.5px}

.navrow{display:flex;justify-content:space-between;gap:12px;margin-top:22px}
.navbtn{padding:13px 22px;border-radius:14px;cursor:pointer;font-family:'Space Grotesk',sans-serif;
  font-weight:700;font-size:14px;border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.05);color:var(--ink);transition:all .3s var(--spring)}
.navbtn:hover:not(:disabled){transform:translateY(-2px) scale(1.03);background:rgba(139,92,246,.18);
  border-color:rgba(139,92,246,.5);box-shadow:0 8px 22px rgba(139,92,246,.3)}
.navbtn:disabled{opacity:.3;cursor:default}
.navbtn.primary{background:var(--grad);color:#0b1024;border:none}
.navbtn.primary:hover{box-shadow:0 8px 26px rgba(244,114,182,.4)}

/* ---------- floater ---------- */
.floater{position:fixed;z-index:60;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;
  pointer-events:none;animation:floatUp .9s ease-out forwards}
.floater.good{color:var(--lime);text-shadow:0 0 14px rgba(74,222,128,.8)}
.floater.bad{color:var(--red);text-shadow:0 0 14px rgba(251,113,133,.8)}
@keyframes floatUp{to{transform:translateY(-56px);opacity:0}}

/* ---------- results ---------- */
.overlay{position:fixed;inset:0;z-index:40;display:none;align-items:flex-start;justify-content:center;
  padding:40px 18px;overflow-y:auto;background:rgba(4,7,18,.78);backdrop-filter:blur(8px)}
.overlay.open{display:flex}
.rescard{width:100%;max-width:640px;padding:34px 32px;text-align:center;position:relative;
  animation:popIn .6s var(--spring) both}
.rescard h2{font-size:26px;margin-bottom:6px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.rescard .gsub{color:var(--dim);font-size:14px}
.ringw{position:relative;width:190px;height:190px;margin:24px auto 8px}
.ringw svg{transform:rotate(-90deg)}
.ringbg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:13}
.ringfg{fill:none;stroke:url(#gradRing);stroke-width:13;stroke-linecap:round;
  transition:stroke-dashoffset 1.4s var(--spring)}
.ringtxt{position:absolute;inset:0;display:grid;place-items:center}
.ringtxt .big{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:700;color:var(--ink)}
.ringtxt .sml{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:2px}
.grade{font-size:17px;font-weight:700;margin:10px 0 22px;color:var(--gold)}
.tmeters{display:flex;flex-direction:column;gap:12px;text-align:left;margin-bottom:26px}
.tmeter .tmh{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.tmeter .tmh .sc{font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:11.5px}
.tmbar{height:8px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.tmfill{height:100%;width:0%;border-radius:99px;background:var(--grad);transition:width .8s var(--spring)}
.tmeter.popd{animation:numPop .45s var(--spring)}
.confetti{position:fixed;top:-14px;z-index:70;width:9px;height:14px;border-radius:2px;pointer-events:none;
  animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  aside.side{position:static}
  .tlist{flex-direction:row;overflow-x:auto;padding-bottom:6px}
  .titem{min-width:190px}
  .opts{grid-template-columns:1fr}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="gridlay"></div>

<div class="wrap">
  <header class="hdr glass">
    <div class="eyebrow">◈ QUANT · BASICS → MODERATE ◈</div>
    <h1 class="title">QUANT CONSOLE</h1>
    <p class="subtitle">Learn the core formulas, then drill 50 MCQs across 5 topics</p>
    <div class="stats">
      <div class="stat c-cyan"><div class="num" id="stTopics">0</div><div class="lbl">Topics</div></div>
      <div class="stat c-violet"><div class="num" id="stQs">0</div><div class="lbl">Questions</div></div>
      <div class="stat c-pink"><div class="num" id="stAns">0</div><div class="lbl">Answered</div></div>
      <div class="stat c-lime"><div class="num" id="stCor">0</div><div class="lbl">Correct</div></div>
    </div>
  </header>

  <div class="layout">
    <aside class="side glass">
      <h3>// TOPICS</h3>
      <div class="tlist" id="tlist"></div>
      <div class="pbarw">
        <div class="pbarl"><span>OVERALL</span><span id="plabel">0/50</span></div>
        <div class="pbar"><div class="pfill" id="pfill"></div></div>
      </div>
      <button class="resbtn" id="resbtn">View Results ▸</button>
    </aside>
    <main class="panel" id="panel"></main>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="rescard glass">
    <h2>SESSION REPORT</h2>
    <p class="gsub" id="resSub"></p>
    <div class="ringw">
      <svg width="190" height="190">
        <defs><linearGradient id="gradRing" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#22D3EE"/><stop offset="50%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#F472B6"/>
        </linearGradient></defs>
        <circle class="ringbg" cx="95" cy="95" r="80"></circle>
        <circle class="ringfg" id="ringfg" cx="95" cy="95" r="80"></circle>
      </svg>
      <div class="ringtxt"><div><div class="big"><span id="ringPct">0</span>%</div><div class="sml">accuracy</div></div></div>
    </div>
    <div class="grade" id="gradeMsg"></div>
    <div class="tmeters" id="tmeters"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="navbtn" id="closeRes">Back to Questions</button>
      <button class="navbtn primary" id="retake">↻ Retake Quiz</button>
    </div>
  </div>
</div>

<script>
/* ================= DATA ================= */
const TOPICS = [
{ id:"pct", ico:"%", name:"Percentages",
  learn:[
    "x% of N = <b>(x/100) × N</b>",
    "Successive changes a%, b% → net = <b>a + b + ab/100</b>",
    "↑ by p% ⇒ restore by ↓ <b>p/(100+p) × 100 %</b>",
    "A is p% more than B ⇒ B is <b>p/(100+p) × 100 %</b> less than A",
    "New value = Old × <b>(1 ± p/100)</b>"
  ],
  qs:[
  {t:"c", q:"The word “percent” literally means:", o:["Per thousand","Per hundred","Per fraction","Per unit"], a:1,
   w:"“Cent” = hundred (as in century). x% is simply x parts out of every 100, i.e. x/100."},
  {t:"k", q:"What is 25% of 240?", o:["55","58","60","64"], a:2,
   w:"25% = 1/4, so 240 ÷ 4 = 60. Learning the fraction equivalents (25%=1/4, 20%=1/5, 12.5%=1/8) makes these instant."},
  {t:"k", q:"Express 3/8 as a percentage.", o:["32.5%","35%","37.5%","42.5%"], a:2,
   w:"3/8 × 100 = 300/8 = 37.5%. Since 1/8 = 12.5%, 3/8 = 3 × 12.5% = 37.5%."},
  {t:"c", q:"A number is increased by 20% and then decreased by 20%. The net effect is:", o:["No change","4% increase","4% decrease","2% decrease"], a:2,
   w:"Net = a + b + ab/100 = 20 − 20 + (20×−20)/100 = −4%. Equal up-down changes always leave a net DECREASE of (x²/100)%."},
  {t:"k", q:"A number increased by 15% becomes 460. The original number is:", o:["391","400","410","415"], a:1,
   w:"Original × 1.15 = 460 ⇒ Original = 460/1.15 = 400. Always divide by the multiplier — never subtract 15% of 460."},
  {t:"k", q:"A's salary is 25% more than B's. B's salary is what percent LESS than A's?", o:["25%","20%","22.5%","33.3%"], a:1,
   w:"Required % = p/(100+p) × 100 = 25/125 × 100 = 20%. The base changes from B to A, so the percentages differ."},
  {t:"k", q:"Successive increases of 10% and 20% give a net increase of:", o:["30%","30.2%","32%","33%"], a:2,
   w:"Net = 10 + 20 + (10×20)/100 = 32%. Check: 1.10 × 1.20 = 1.32."},
  {t:"k", q:"In a school, 40% of students are girls. If there are 240 boys, the total number of students is:", o:["380","400","420","600"], a:1,
   w:"Boys = 60% of total = 240 ⇒ total = 240/0.60 = 400."},
  {t:"k", q:"The price of petrol rises by 25%. By what percent must a user cut consumption so that the expenditure stays the same?", o:["25%","20%","18%","22.5%"], a:1,
   w:"Cut = p/(100+p) × 100 = 25/125 × 100 = 20%. (Price ×5/4 ⇒ quantity ×4/5, i.e. a 1/5 = 20% cut.)"},
  {t:"k", q:"In a two-candidate election the winner got 60% of the votes and won by 1,200 votes. Total votes polled:", o:["4,800","5,400","6,000","7,200"], a:2,
   w:"Margin = 60% − 40% = 20% of total = 1,200 ⇒ total = 1,200/0.20 = 6,000."}
]},
{ id:"ratio", ico:"a:b", name:"Ratio & Proportion",
  learn:[
    "Combine a:b and b:c by matching <b>b</b> (take LCM)",
    "Fourth proportional to a, b, c = <b>bc/a</b>",
    "Mean proportional of a and b = <b>√(ab)</b>",
    "Third proportional to a, b = <b>b²/a</b>",
    "Partnership profit ∝ <b>investment × time</b>"
  ],
  qs:[
  {t:"c", q:"A ratio can be formed only between two quantities that:", o:["Are both large numbers","Are in the same units","Are whole numbers","Are unequal"], a:1,
   w:"A ratio compares like with like, so both quantities must be in the same units — and the ratio itself has NO units."},
  {t:"k", q:"₹720 is divided among A, B, C in the ratio 2:3:4. The largest share is:", o:["₹240","₹280","₹320","₹360"], a:2,
   w:"One part = 720/(2+3+4) = 80. Largest share = 4 × 80 = ₹320."},
  {t:"k", q:"If a:b = 3:4 and b:c = 2:3, then a:b:c = ?", o:["3:4:6","6:8:9","3:4:5","2:3:4"], a:0,
   w:"Match b: b:c = 2:3 = 4:6. So a:b:c = 3:4:6."},
  {t:"k", q:"The fourth proportional to 4, 6 and 10 is:", o:["12","15","16","18"], a:1,
   w:"4:6 :: 10:x ⇒ x = (6 × 10)/4 = 15. Formula: fourth proportional = bc/a."},
  {t:"k", q:"The mean proportional between 4 and 25 is:", o:["10","12.5","14.5","100"], a:0,
   w:"Mean proportional = √(4 × 25) = √100 = 10 (it's the geometric mean, not the average 14.5)."},
  {t:"k", q:"Two numbers are in the ratio 5:7. If 6 is added to each, the ratio becomes 4:5. The smaller number is:", o:["10","12","14","15"], a:0,
   w:"(5x+6)/(7x+6) = 4/5 ⇒ 25x+30 = 28x+24 ⇒ x = 2. Numbers are 10 and 14; smaller = 10."},
  {t:"k", q:"The ages of two friends are in the ratio 4:5. After 6 years the ratio becomes 5:6. The younger friend's present age is:", o:["20","24","28","30"], a:1,
   w:"(4x+6)/(5x+6) = 5/6 ⇒ 24x+36 = 25x+30 ⇒ x = 6. Ages: 24 and 30; younger = 24."},

{ id:"tw", ico:"⚙", name:"Time & Work",

  {t:"k", q:"10 men working 6 h/day finish a job in 18 days. 15 men working 8 h/day will finish it in:", o:["8 days","9 days","10 days","12 days"], a:1,

  learn:[

    "Train crossing: distance = <b>sum of lengths</b>",
    "Relative speed: opposite <b>add</b>, same direction <b>subtract</b>; boat: <b>u ± v</b>"
  ],
  qs:[

   w:"1 km/h = 1000 m / 3600 s = 5/18 m/s. Reverse conversion uses 18/5."},
  {t:"k", q:"72 km/h expressed in m/s is:", o:["18","20","24","25"], a:1,
   w:"72 × 5/18 = 20 m/s. (72/18 = 4, ×5 = 20.)"},
  {t:"k", q:"A car travels at 45 km/h for 2 h 40 min. Distance covered:", o:["110 km","115 km","120 km","125 km"], a:2,
   w:"2 h 40 min = 8/3 h. D = 45 × 8/3 = 120 km. Always convert minutes to a fraction of an hour first."},
  {t:"k", q:"A man covers a distance at 40 km/h and returns at 60 km/h. His average speed is:", o:["50 km/h","48 km/h","52 km/h","45 km/h"], a:1,
   w:"Equal distances ⇒ avg = 2xy/(x+y) = 2×40×60/100 = 48 km/h — never the simple average 50."},
  {t:"k", q:"A 150 m train crosses a pole in 6 seconds. Its speed is:", o:["80 km/h","85 km/h","90 km/h","96 km/h"], a:2,
   w:"Speed = 150/6 = 25 m/s = 25 × 18/5 = 90 km/h. A pole has no length, so distance = train length only."},
  {t:"k", q:"A 120 m train at 54 km/h crosses a 180 m platform in:", o:["18 s","20 s","22 s","24 s"], a:1,
   w:"54 km/h = 15 m/s. Distance = 120 + 180 = 300 m ⇒ 300/15 = 20 s. Platform length adds to train length."},
  {t:"k", q:"Trains of 100 m and 140 m run at 42 km/h and 30 km/h in opposite directions. Time to cross each other:", o:["10 s","12 s","14 s","16 s"], a:1,
   w:"Relative speed = 42 + 30 = 72 km/h = 20 m/s. Distance = 100 + 140 = 240 m ⇒ 240/20 = 12 s."},
  {t:"k", q:"A boat goes 24 km downstream in 3 h and returns in 4 h. Its speed in still water is:", o:["6 km/h","7 km/h","8 km/h","9 km/h"], a:1,
   w:"Downstream = 24/3 = 8, upstream = 24/4 = 6. Still water u = (8+6)/2 = 7 km/h (stream = (8−6)/2 = 1)."},
  {t:"k", q:"Walking at 5/6 of his usual speed, a man is 10 min late. His usual time for the trip is:", o:["40 min","45 min","50 min","60 min"], a:2,
   w:"Speed × 5/6 ⇒ time × 6/5, i.e. extra time = 1/5 of usual = 10 min ⇒ usual time = 50 min."},
  {t:"k", q:"Two cities are 300 km apart. Cars start towards each other at 50 km/h and 70 km/h. They meet after:", o:["2 h","2.5 h","3 h","3.5 h"], a:1,
   w:"Closing speed = 50 + 70 = 120 km/h ⇒ 300/120 = 2.5 h."}

/* ================= STATE ================= */
const flat = []; TOPICS.forEach((t,ti)=>t.qs.forEach((q,qi)=>flat.push({ti,qi})));
let answers = {};            // "ti-qi" -> {pick, ok}
let curTopic = 0;
const $ = id => document.getElementById(id);
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ================= HELPERS ================= */
function countUp(el, to, ms=600){
  if(reduced){ el.textContent = to; return; }
  const from = parseInt(el.textContent)||0;
  if(from===to){ el.textContent=to; return; }
  const t0 = performance.now();
  function step(t){
    const p = Math.min(1,(t-t0)/ms);
    el.textContent = Math.round(from+(to-from)*(1-Math.pow(1-p,3)));
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick');
}
function stats(){
  const a = Object.keys(answers).length;
  const c = Object.values(answers).filter(x=>x.ok).length;
  countUp($('stAns'),a,400); countUp($('stCor'),c,400);
  $('plabel').textContent = a+"/"+flat.length;
  $('pfill').style.width = (a/flat.length*100)+"%";
  renderSidebar();
}
function floater(x,y,ok){
  const f = document.createElement('div');
  f.className = 'floater '+(ok?'good':'bad');
  f.textContent = ok? '+1' : '✕';
  f.style.left = x+'px'; f.style.top = y+'px';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),950);
}
function confetti(n=120){
  const cols = ['#22D3EE','#8B5CF6','#F472B6','#4ADE80','#FBBF24'];
  for(let i=0;i<n;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = cols[i%cols.length];
    c.style.animationDuration = (2.4+Math.random()*1.8)+'s';
    c.style.animationDelay = (Math.random()*0.6)+'s';
    c.style.transform = 'rotate('+(Math.random()*360)+'deg)';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

/* ================= SIDEBAR ================= */
function renderSidebar(){
  const el = $('tlist'); el.innerHTML='';
  TOPICS.forEach((t,ti)=>{
    const done = t.qs.filter((_,qi)=>answers[ti+'-'+qi]).length;
    const ok = t.qs.filter((_,qi)=>answers[ti+'-'+qi]?.ok).length;
    const d = document.createElement('div');
    d.className = 'titem'+(ti===curTopic?' active':'')+(done===t.qs.length?' done':'');
    d.innerHTML = '<div class="ico">'+t.ico+'</div><div><div class="tn">'+t.name+'</div>'+
      '<div class="tp">'+(done===t.qs.length?'✓ ':'')+done+'/'+t.qs.length+' · '+ok+' ✓</div></div>';
    d.onclick = ()=>{ curTopic=ti; renderTopic(); window.scrollTo({top:0,behavior:reduced?'auto':'smooth'}); };
    el.appendChild(d);
  });
}

/* ================= MAIN PANEL ================= */
function renderTopic(){
  const t = TOPICS[curTopic];
  const p = $('panel'); p.innerHTML='';

  const head = document.createElement('div');
  head.className = 'tophead glass';
  head.innerHTML = '<h2>'+t.name+'</h2><span class="tag">TOPIC '+(curTopic+1)+'/'+TOPICS.length+' · '+t.qs.length+' Qs</span>';
  p.appendChild(head);

  const learn = document.createElement('div');
  learn.className = 'learn glass';
  learn.innerHTML = '<h4>📘 LEARN FIRST — CORE FORMULAS</h4><div class="chips">'+
    t.learn.map(c=>'<span class="chip">'+c+'</span>').join('')+'</div>';
  p.appendChild(learn);

  t.qs.forEach((q,qi)=>{
    const key = curTopic+'-'+qi;
    const st = answers[key];
    const card = document.createElement('div');
    card.className = 'qcard glass';
    card.style.animationDelay = (Math.min(qi,6)*0.05)+'s';
    const tag = q.t==='c'
      ? '<span class="qtag concept">◈ Concept</span>'
      : '<span class="qtag calc">⚙ Calculation</span>';
    card.innerHTML = '<div class="qtop"><span class="qnum mono">Q'+String(qi+1).padStart(2,'0')+'</span>'+tag+'</div>'+
      '<div class="qtext">'+q.q+'</div>';
    const opts = document.createElement('div'); opts.className='opts';
    q.o.forEach((o,oi)=>{
      const b = document.createElement('button');
      b.className = 'opt';
      b.innerHTML = '<span class="key">'+String.fromCharCode(65+oi)+'</span>'+o;
      if(st){
        b.disabled = true;
        if(oi===q.a) b.classList.add('correct');
        else if(oi===st.pick) b.classList.add('wrong');
        else b.classList.add('dimmed');
      } else {
        b.onclick = (e)=>answer(e,qi,oi);
      }
      opts.appendChild(b);
    });
    card.appendChild(opts);
    const why = document.createElement('div');
    why.className = 'why'+(st?' show':'');
    why.innerHTML = '<b>WHY →</b> '+q.w;
    card.appendChild(why);
    p.appendChild(card);
  });

  const nav = document.createElement('div'); nav.className='navrow';
  const prev = document.createElement('button');
  prev.className='navbtn'; prev.textContent='← Prev Topic';
  prev.disabled = curTopic===0;
  prev.onclick = ()=>{ curTopic--; renderTopic(); window.scrollTo({top:0}); };
  const next = document.createElement('button');
  if(curTopic < TOPICS.length-1){
    next.className='navbtn'; next.textContent='Next Topic →';
    next.onclick = ()=>{ curTopic++; renderTopic(); window.scrollTo({top:0}); };
  } else {
    next.className='navbtn primary'; next.textContent='Finish → View Results';
    next.onclick = showResults;
  }
  nav.appendChild(prev); nav.appendChild(next);
  p.appendChild(nav);
  renderSidebar();
}

function answer(e, qi, oi){
  const t = TOPICS[curTopic], q = t.qs[qi];
  const ok = oi===q.a;
  answers[curTopic+'-'+qi] = {pick:oi, ok};
  const card = e.currentTarget.closest('.qcard');
  const btns = card.querySelectorAll('.opt');
  btns.forEach((b,bi)=>{
    b.disabled = true;
    if(bi===q.a) b.classList.add('correct');
    else if(bi===oi) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  card.querySelector('.why').classList.add('show');
  floater(e.clientX-8, e.clientY-14, ok);
  stats();
}

/* ================= RESULTS ================= */
function showResults(){
  const a = Object.keys(answers).length;
  const c = Object.values(answers).filter(x=>x.ok).length;
  const pct = a ? Math.round(c/a*100) : 0;
  $('resSub').textContent = c+' correct out of '+a+' answered ('+flat.length+' total)';
  const CIRC = 2*Math.PI*80;
  const fg = $('ringfg');
  fg.style.strokeDasharray = CIRC;
  fg.style.strokeDashoffset = CIRC;
  $('overlay').classList.add('open');
  setTimeout(()=>{ fg.style.strokeDashoffset = CIRC*(1-pct/100); },60);
  countUp($('ringPct'), pct, 1300);

  let msg;
  if(a < flat.length) msg = '⏳ '+(flat.length-a)+' questions left — finish the run for your full grade!';
  else if(pct>=90) msg = '🏆 Elite! Quant Console fully mastered.';
  else if(pct>=75) msg = '🚀 Strong performance — moderate level unlocked.';
  else if(pct>=50) msg = '📈 Good base — revisit the ⚙ Calculation misses.';
  else msg = '🔁 Keep drilling — re-read each topic\'s formula card first.';
  $('gradeMsg').textContent = msg;

  const tm = $('tmeters'); tm.innerHTML='';
  TOPICS.forEach((t,ti)=>{
    const ok = t.qs.filter((_,qi)=>answers[ti+'-'+qi]?.ok).length;
    const p = Math.round(ok/t.qs.length*100);
    const d = document.createElement('div');
    d.className='tmeter';
    d.innerHTML = '<div class="tmh"><span>'+t.name+'</span><span class="sc mono">'+ok+'/'+t.qs.length+'</span></div>'+
      '<div class="tmbar"><div class="tmfill"></div></div>';
    tm.appendChild(d);
    setTimeout(()=>{
      d.querySelector('.tmfill').style.width = p+'%';
      setTimeout(()=>d.classList.add('popd'), 800);
    }, 250 + ti*180);
  });

  if(a===flat.length && pct>=75 && !reduced) confetti();
}
$('resbtn').onclick = showResults;
$('closeRes').onclick = ()=>$('overlay').classList.remove('open');
$('retake').onclick = ()=>{
  answers = {}; curTopic = 0;
  $('overlay').classList.remove('open');
  renderTopic(); stats();
  window.scrollTo({top:0});
};

/* ================= INIT ================= */
countUp($('stTopics'), TOPICS.length, 900);
countUp($('stQs'), flat.length, 900);
renderTopic();
stats();
</script>
</body>
